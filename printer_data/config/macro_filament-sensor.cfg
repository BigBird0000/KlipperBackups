# # # M117 Filament encoder inserted

[delayed_gcode DISABLEFILAMENTSENSOR] ; This will disable the SFS 1 second after klipper starts
initial_duration: 1
gcode:
    SET_FILAMENT_SENSOR SENSOR=encoder_sensor ENABLE=0

[gcode_macro SFS_ENABLE] ; Add this to PRINT_START to start the sensor right away
description: Enable smart filament sensor
gcode:
    M117 ENABLING the Smart Filament Sensor
    G92 E0
    SET_FILAMENT_SENSOR SENSOR=encoder_sensor ENABLE=1 ; Put your filament sensor's name after SENSOR=

[gcode_macro SFS_ENABLE] ; Add this to PRINT_START to start the sensor right away
# This is the encoder sensor of the BTT SFS 2.0 which detects the quantity of filament going through the sensor to figure out if there was a jam, clog or an issue with the print
    [filament_motion_sensor encoder_sensor]
    switch_pin: ^PG13:  pin  "Encoder". 
    detection_length: 10: #This is the accuracy value recommended by Voron. 
	                      # value too low might lead to more false-positives (your printer will pause more often than necessary)
						  
    pause_on_runout: true: # true: pause printer when the filament runs out

    #runout_gcode / inserted_gcode: This is the gcode that will be run when the filament runs out. PAUSE is a macro that will be configured later if you don't already have a PAUSE macro. [pause_resume] is a section that you might already have, otherwise, it will be configured later.


[gcode_macro SFS_DISABLE] ; Add this to PRINT_END and PRINT_CANCEL to disable the sensor right away
description: Disable smart filament sensor
gcode:
    M117 DISABLING the Smart Filament Sensor
    G92 E0
    SET_FILAMENT_SENSOR SENSOR=encoder_sensor ENABLE=0 ; Put your filament sensor's name after SENSOR=
[gcode_macro SFS_ENABLE] ; Add this to PRINT_START to start the sensor right away

[delayed_gcode DISABLEFILAMENTSENSOR]: This delayed_gcode command allows us to automatically execute the following gcode 1 second after Klipper starts. This is needed since a lot of issues can arise from having the BTT SFS 2.0 enabled during the initial calibratio and purge line (if used on your printer).
    SET_FILAMENT_SENSOR SENSOR=encoder_sensor ENABLE=0: # disables the filament sensor






