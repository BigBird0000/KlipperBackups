# Expected behavior (summary)
# Event	Action
# Filament runs out	Error beeps, pause, lift Z, move head
# New filament inserted	Double beep
# Resume print	Long confirmation beep
# Still paused	Quiet reminder beep every 1 hr


# # # # # # # # # # # # # # Runout macro (pause + move + error beeps)
# Loud error beeps, Pauses print, Lifts Z, Moves nozzle forward,
#   Shows message on LCD / UI
[gcode_macro FILAMENT_RUNOUT]
gcode:
    M117 Filament Runout!
    BEEP_ERROR

    PAUSE

    # Lift nozzle safely
    G91
    G1 Z10 F600
    G90

    # Move head to front
    G1 X10 Y10 F3000

    M117 Load Filament
	UPDATE_DELAYED_GCODE ID=FILAMENT_REMINDER DURATION=3600


# # # # # # # # # # # # # # # Filament inserted macro (confirmation beep)
# confirms the sensor was triggered again.
[gcode_macro FILAMENT_INSERTED]
gcode:
    M117 Filament Inserted
    BEEP_DOUBLE


# # # # # # # # # # # # # # # Resume print macro (with confirmation beep)

[gcode_macro RESUME]
rename_existing: BASE_RESUME
gcode:
    M117 Resuming Print
    BEEP_LONG
    BASE_RESUME

# # # # # # # # Filament Reminder beeps (VERY useful)
# This will beep every 30 seconds until filament is loaded.

[delayed_gcode FILAMENT_REMINDER]
gcode:
    # 30 seconds =30; 1 Hour=3600
    {% if printer.pause_resume.is_paused %}
        BEEP_SHORT
        UPDATE_DELAYED_GCODE ID=FILAMENT_REMINDER DURATION=3600
    {% endif %}


# # # # # # # # # # # Disable sensor during filament changes
#  Sometimes useful to avoid false triggers:

[gcode_macro FILAMENT_SENSOR_OFF]
gcode:
    SET_FILAMENT_SENSOR SENSOR=filament_runout ENABLE=0
    M117 Filament Sensor OFF

[gcode_macro FILAMENT_SENSOR_ON]
gcode:
    SET_FILAMENT_SENSOR SENSOR=filament_runout ENABLE=1
    M117 Filament Sensor ON


# # # # # # cool items

#AUTO LOAD / UNLOAD FILAMENT (orig bowden)

#Bowden Auto-Load Filament assume extruder is hot
[gcode_macro LOAD_FILAMENT]
gcode:
    {% if printer.extruder.temperature < 180 %}
        M117 Heating for Load
        M109 S200
    {% endif %}

    M117 Loading Filament
    BEEP_SHORT

    G91
    G1 E30 F300
    G1 E20 F150
    G90

    BEEP_DOUBLE
    M117 Load Complete

#Auto-Unload Filament
[gcode_macro UNLOAD_FILAMENT]
gcode:
    {% if printer.extruder.temperature < 180 %}
        M117 Heating for Unload
        M109 S200
    {% endif %}

    M117 Unloading Filament
    BEEP_SHORT

    G91
    G1 E5 F300
    G1 E-40 F1000
    G90

    BEEP_DOUBLE
    M117 Unload Complete

#LCD MENU TOGGLE - FILAMENT SENSOR
# This lets you enable/disable the sensor from the screen or UI.

[gcode_macro FILAMENT_SENSOR_TOGGLE]
variable_enabled: 1
gcode:
    {% if enabled %}
        SET_FILAMENT_SENSOR SENSOR=filament_runout ENABLE=0
        SET_GCODE_VARIABLE MACRO=FILAMENT_SENSOR_TOGGLE VARIABLE=enabled VALUE=0
        M117 Filament Sensor OFF
        BEEP_SHORT
    {% else %}
        SET_FILAMENT_SENSOR SENSOR=filament_runout ENABLE=1
        SET_GCODE_VARIABLE MACRO=FILAMENT_SENSOR_TOGGLE VARIABLE=enabled VALUE=1
        M117 Filament Sensor ON
        BEEP_DOUBLE
    {% endif %}

#Add to LCD menu
[menu __main __filament_sensor]
type: command
name: Filament Sensor
gcode:
    FILAMENT_SENSOR_TOGGLE

#NIGHT MODE (MUTE BEEPER)
# mode ON
[gcode_macro NIGHT_MODE_ON]
gcode:
    SET_GCODE_VARIABLE MACRO=BEEPER_CONTROL VARIABLE=enabled VALUE=0
    M117 Night Mode ON

#Night mode OFF
[gcode_macro NIGHT_MODE_OFF]
gcode:
    SET_GCODE_VARIABLE MACRO=BEEPER_CONTROL VARIABLE=enabled VALUE=1
    M117 Night Mode OFF
    BEEP_DOUBLE

#Beeper control wrapper (IMPORTANT)
#Replace your beeps with this logic:

[gcode_macro BEEPER_CONTROL]
variable_enabled: 1
gcode:
    {% if enabled %}
        SET_PIN PIN=beeper VALUE=1
    {% endif %}


# Your existing beep macros already respect this automatically because they call SET_PIN.

# "ARE YOU THERE?" TIMED ALERTS
# This is a gentle reminder beep if the printer is paused too long.
[delayed_gcode ARE_YOU_THERE]
gcode:
    {% if printer.pause_resume.is_paused %}
        BEEP_SHORT
        UPDATE_DELAYED_GCODE ID=ARE_YOU_THERE DURATION=300
    {% endif %}

# Start reminder when paused

#Add this to your FILAMENT_RUNOUT macro:

#UPDATE_DELAYED_GCODE ID=ARE_YOU_THERE DURATION=300

# # # Auto-Load Filament (Direct Drive Safe)
[gcode_macro LOAD_FILAMENT]
gcode:
    {% if printer.extruder.temperature < 180 %}
        M117 Heating for Load
        M109 S200
    {% endif %}

    M117 Loading Filament
    BEEP_SHORT

    G91
    G1 E10 F120
    G1 E10 F60
    G90

    BEEP_DOUBLE
    M117 Load Complete


# Auto-Unload Filament (Direct Drive Safe)
[gcode_macro UNLOAD_FILAMENT]
gcode:
    {% if printer.extruder.temperature < 180 %}
        M117 Heating for Unload
        M109 S200
    {% endif %}

    M117 Unloading Filament
    BEEP_SHORT

    G91
    G1 E3 F120
    G1 E-15 F300
    G90

    BEEP_DOUBLE
    M117 Unload Complete


#OPTIONAL: LCD MENU ENTRIES
# Add these to your menu for easy access:

[menu __main __filament __load]
type: command
name: Load Filament
gcode:
    LOAD_FILAMENT

[menu __main __filament __unload]
type: command
name: Unload Filament
gcode:
    UNLOAD_FILAMENT

