# macro_hotend.cfg


#

[gcode_macro __CFG_MARKER_MACRO_hotend]
gcode:
    RESPOND PREFIX="CFG" MSG="Loaded: macro_hotend.cfg"



[gcode_macro FORCE_HOTEND_UP_25MM]
gcode:
    force_move stepper=stepper_z distance=10 velocity=100 accel=300



# USAGE:
#  SAVE_HOTEND_TEMP
#  ; do something (tool change, filament change, pause, etc.)
#  RESTORE_HOTEND_TEMP






# RESTORE_HOTEND_TEMP
# Reads saved temp variable from SAVE_HOTEND_TEMP
# Sets and waits for the hotend to reach temperature
# Errors gracefully if nothing was saved
# # #  fully automated filament change
# with safety checks.
#  This version ensures:
# # #  Hotend is a safe temperature
# waits max amt of time for filament insert
# prevents accidental heating
# # #  Optional priming.
# # #  Hotend Save Macro (unchanged, safe)
[gcode_macro SAVE_HOTEND_TEMP]
variable_saved_temp: 0.0
gcode:
    {% set current = printer.extruder.target %}
    {% if current > 0 %}
        SET_GCODE_VARIABLE MACRO=SAVE_HOTEND_TEMP VARIABLE=saved_temp VALUE={current}
        M104 S0  ; optional: turn off hotend
        RESPOND PREFIX=info MSG="Saved hotend temp: {current}C"
    {% else %}
        RESPOND PREFIX=error MSG="Hotend temp is 0 C, not saving."
    {% endif %}


