# macro_beeper.cfg

[gcode_macro BEEP]
gcode:
  RESPOND PREFIX="TEST" MSG="Inside Macro Beep"
    SET_PIN PIN=beeper VALUE=1
    G4 P200
    SET_PIN PIN=beeper VALUE=0


# Recommended Uses
#    Print finished		BEEP_TRIPLE
#    Filament runout	BEEP_ERROR
#    Cancel print		BEEP_LONG
#    Startup chime (in delayed_gcode) - BEEP_DOUBLE

# Notes
# These cannot change pitch (active buzzer limitation)
# Timing is 100% safe for the display beeper
# All patterns are non-blocking after macro finishes


# Short Beep Good for button presses or minor notifications.
[gcode_macro BEEP_SHORT]
gcode:
    SET_PIN PIN=beeper VALUE=1
    G4 P80
    SET_PIN PIN=beeper VALUE=0


# Normal Beep - General-purpose notification.
[gcode_macro BEEP_NORMAL]
gcode:
    SET_PIN PIN=beeper VALUE=1
    G4 P200
    SET_PIN PIN=beeper VALUE=0


# Long Beep - Good for print finished.
[gcode_macro BEEP_LONG]
gcode:
    SET_PIN PIN=beeper VALUE=1
    G4 P600
    SET_PIN PIN=beeper VALUE=0

# Double Beep
[gcode_macro BEEP_DOUBLE]
gcode:
    {% for i in range(2) %}
        SET_PIN PIN=beeper VALUE=1
        G4 P150
        SET_PIN PIN=beeper VALUE=0
        G4 P150
    {% endfor %}

# Triple Beep - Classic "print done" sound.
[gcode_macro BEEP_TRIPLE]

gcode:
    RESPOND PREFIX="TEST" MSG="Start Beep_Triple"
    {% for i in range(3) %}
        SET_PIN PIN=beeper VALUE=1
        G4 P150
        SET_PIN PIN=beeper VALUE=0
        G4 P150
    {% endfor %}

#Error Beep (Urgent) - Fast, sharp pattern that stands out.
[gcode_macro BEEP_ERROR]
gcode:
    {% for i in range(5) %}
        SET_PIN PIN=beeper VALUE=1
        G4 P100
        SET_PIN PIN=beeper VALUE=0
        G4 P100
    {% endfor %}

#Critical Error Beep (Very obvious)
[gcode_macro BEEP_CRITICAL]
gcode:
    {% for i in range(3) %}
        SET_PIN PIN=beeper VALUE=1
        G4 P500
        SET_PIN PIN=beeper VALUE=0
        G4 P200
    {% endfor %}

#Smart Beep Macro - One macro, many patterns:
[gcode_macro BEEP]
variable_type: "normal"
gcode:
    {% if type == "short" %}
        BEEP_SHORT
    {% elif type == "long" %}
        BEEP_LONG
    {% elif type == "double" %}
        BEEP_DOUBLE
    {% elif type == "triple" %}
        BEEP_TRIPLE
    {% elif type == "error" %}
        BEEP_ERROR
    {% elif type == "critical" %}
        BEEP_CRITICAL
    {% else %}
        BEEP_NORMAL
    {% endif %}
# Usage:
#   BEEP TYPE=error
#   BEEP TYPE=short
#   BEEP TYPE=critical
