#
#
# This file contains common pin mappings for the BIGTREETECH SKR mini
# E3 v3.0. To use this config, the firmware should be compiled for the
# STM32G0B1 with a "8KiB bootloader" and USB communication/USART.

# The "make flash" command does not work on the SKR mini E3. Instead,
# after running "make", copy the generated "out/klipper.bin" file to a
# file named "firmware.bin" on an SD card and then restart the SKR
# mini E3 with that SD card.

# See docs/Config_Reference.md for a description of parameters.

# NOTE:
# Verify your MCU serial line matches your system before restarting.
[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32g0b0xx_1D000D0010504B5735313920-if00
# serial: /dev/ttyAMA0
# restart_method: command

[printer]
kinematics: cartesian
max_velocity: 300#200 #300
max_accel: 3000#1500#3500
max_z_velocity: 5
max_z_accel: 100
# deprecated max_accel_to_decel: 1500 #1750
#min Cruise: 0.1 means 10% of move=constant velocity, 0.99=99% of move constant vel
# 0.99 = 99% of move @ constant velocity, 1% of move distance for acceleration which
# is why it is so slow. 
minimum_cruise_ratio: 0.5 #0.1 # suggested for most printers
square_corner_velocity: 3.0 #5.0

[firmware_retraction]
retract_length: 0.5
retract_speed: 35
unretract_extra_length: 0
unretract_speed: 35

[gcode_macro SET_MATERIAL_PLA]
gcode:
    SET_RETRACTION LENGTH=0.5

[gcode_macro SET_MATERIAL_PETG]
gcode:
    SET_RETRACTION LENGTH=0.4




[idle_timeout]
timeout: 14400	# in seconds

## Used to get klipper to debug look for DEBUGAJS
[respond]
default_prefix: echo
default_type: echo
 
####################  Neo Pixel NeoPixel LED ##################################
## RGB RBG GRB GBR BGR BRG GRBW  Sequential
[neopixel status_leds]
pin: PA8 # GPIO pin connected to the Neopixel data line
chain_count: 11 # Number of LEDs in the chain
color_order: GRB # Color order (e.g., GRB, RGB, etc.)
initial_RED: 0.0
initial_GREEN: 0.0
initial_BLUE: 0.0


#################### "Startup" #########################
[delayed_gcode AUTO_HOME_ON_STARTUP]
initial_duration: 5 #30 #10
gcode:
    M400
    
#    {% if printer.toolhead.homed_axes != "xyz" %}
#G28
#   {% endif %}
    
    
# [filament_switch_sensor filament_runout]
# switch_pin: PC15
# # # !!
# # #We disable pause_on_runout so we can fully control behavior.
# pause_on_runout: False
# runout_gcode:
#     FILAMENT_RUNOUT
# insert_gcode:
#     FILAMENT_INSERTED

#################### INPUT SHAPING (SAFE BASELINE) ###################

[input_shaper]
shaper_type_x: mzv
shaper_freq_x: 40.0
shaper_type_y: mzv
shaper_freq_y: 40.0

######################## CR-TOUCH / BLTOUCH ##########################

[bltouch]
sensor_pin: ^PC14 #Remove ^ if crashes into bed, ^=CRtouch, No ^=bl touch
control_pin: PA1

### BLTOUCH OFFSET IS  -36.38
#probe X=146, nozzle X=100
#offset = nozzle-probe = 100-146=-46
# # # NOTE: if either of these changes, you need to adjust the screws_tilt
# # #       positions in screws_tilt.cfg
x_offset: -46
y_offset: 0
# # #
# # #
#z_offset: 0 # z_offset: 1.25 #always positive, so use ABS()
speed: 5.0
lift_speed: 10.0
pin_up_reports_not_triggered: False
stow_on_each_sample: False
probe_with_touch_mode: True
pin_move_time: 0.675
#probe_pause: 0.5   # wait 500ms between deploy/stow automatically
# optional for slow deploy/retract
#set_probe_pin_down_delay: 0.5
#set_probe_pin_up_delay: 1.0 # was 0.5

# --- Multi-sample probing options ---
samples: 2                 # Take 2samples
samples_result: average    # Use the average
sample_retract_dist: 3.0   # Lift 3 mm between samples
# --- Tolerance / retries ---
samples_tolerance: 0.02        # Max allowed variance
samples_tolerance_retries: 3     # Retry if variance too high
# --- Slow final sample ---
# not supported in BLTOUCHsamples_first_fast: False        # Only the FIRST sample uses fast_z_rate

######################## SAFE Z HOME #################################

[safe_z_home]
home_xy_position: 115,115
speed: 50
z_hop: 10
z_hop_speed: 5

######################## BED MESH ####################################

[bed_mesh]
speed: 120
horizontal_move_z: 5
mesh_min: 20,20
#mesh_max: 200,200
mesh_max: 180,200
probe_count: 3,3
algorithm: bicubic
fade_start: 1.0 #height in mm to begin fading out the applied effect of the mesh
fade_end: 10.0 # height in mm to end the applied effect of the mesh. If you want
#              # to disable fade make this value lower than the value of fade_start
fade_target: 0

######################## STEPPERS ####################################

[virtual_sdcard]
path: ~/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

    
#---------------------- Stepper X ------------------------------------
[stepper_x]
step_pin: PB13
dir_pin: !PB12
enable_pin: !PB14
microsteps: 16
rotation_distance: 40.25  ##39.8586 #< Calitower 
endstop_pin: ^PC0
position_endstop: 0
position_min: -10
position_max: 235
homing_speed: 50

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
run_current: 0.580
hold_current: 0.500
stealthchop_threshold: 999999
#---------------------- Stepper Y ------------------------------------
[stepper_y]
step_pin: PB10
dir_pin: !PB2
enable_pin: !PB11
microsteps: 16
rotation_distance: 40.25  ##39.925 #< calitower   
endstop_pin: ^PC1
position_endstop: 0
position_min: -10
position_max: 235
homing_speed: 50

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
run_current: 0.580
hold_current: 0.500
stealthchop_threshold: 999999
#---------------------- Stepper Z ------------------------------------
[stepper_z]
step_pin: PB0
dir_pin: PC5
enable_pin: !PB1
microsteps: 16
rotation_distance: 8.0  # 8.0 is recommended, I calculated 7.92  
endstop_pin: probe:z_virtual_endstop
position_max: 250
position_min: -2

[tmc2209 stepper_z]
uart_pin: PC11
tx_pin: PC10
uart_address: 1
run_current: 0.65
hold_current: 0.500
stealthchop_threshold: 999999

######################## EXTRUDER ####################################

[extruder]
step_pin: PB3
dir_pin: !PB4
enable_pin: !PD1
microsteps: 16
rotation_distance: 31.638553 #31.3253 #32.974 #32.4496 #34.00 # suggest 34.458
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PC8
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA0
min_temp: 0
max_temp: 250
pressure_advance_smooth_time: 0.040
max_extrude_only_distance: 110
max_extrude_only_velocity: 60

[tmc2209 extruder]
uart_pin: PC11
tx_pin: PC10
uart_address: 3
run_current: 0.650
hold_current: 0.500
stealthchop_threshold: 999999

######################## HEATERS / FANS ##############################

[heater_bed]
heater_pin: PC9
sensor_type: ATC Semitec 104GT-2
sensor_pin: PC4
control: pid
pid_Kp: 54.027
pid_Ki: 0.770
pid_Kd: 948.182
min_temp: 0
max_temp: 130

# controller board cooling fan
# [heater_fan controller_fan]
# pin: PB15
# heater: heater_bed
# heater_temp: 45.0
#change to always on
[output_pin controller_fan]
pin: PB15
value: 1.0
shutdown_value: 1.0



#hotend heatsink fan
#this was renamed so it could be controlled via console
[heater_fan nozzle_cooling_fan]
pin: PC7
heater: extruder
heater_temp: 50
# temporary use for testing voltage to fan
#[fan]
#pin: PC7


#part colling fan
[fan]
pin: PC6


######################## DISPLAY ############################
#  BigTreeTech TFT TouchScreen emulated 12864 mode

[display]
lcd_type: emulated_st7920
spi_software_miso_pin: PD8 # status led, Virtual MISO
spi_software_mosi_pin: PD6
spi_software_sclk_pin: PB9
en_pin: PB8
encoder_pins: ^PA10, ^PA9
click_pin: ^!PA15

######################## BEEPER ############################
[output_pin beeper]
pin: PB5
value: 0
shutdown_value: 0

###########################  SKEW_CORRECTION    ##################################
[skew_correction]

### Enable force_move command
[force_move]
enable_force_move: True

###########################  AUTO_SPEED    ##################################
#[auto_speed]
#defaults are below, can modify and uncomment as needed
#axis: diag_x, diag_y  ; One or multiple of `x`, `y`, `diag_x`, `diag_y`, `z`
#margin: 20            ; How far away from your axes to perform movements
#settling_home: 1      ; Perform settling home before starting Auto Speed
#max_missed: 1.0       ; Maximum full steps that can be missed
#endstop_samples: 3    ; How many endstop samples to take for endstop variance
#accel_min: 1000.0     ; Minimum acceleration test may try
#accel_max: 50000.0    ; Maximum acceleration test may try
#accel_accu: 0.05      ; Keep binary searching until result within this percentage
#velocity_min: 50.0    ; Minimum velocity test may try
#velocity_max: 5000.0  ; Maximum velocity test may try
#velocity_accu: 0.05   ; Keep binary searching until the result is within this percentage
#derate: 0.8           ; Derate discovered results by this amount
#validate_margin: Unset      ; Margin for VALIDATE, Defaults to margin
#validate_inner_margin: 20.0 ; Margin for VALIDATE inner pattern
#validate_iterations: 50     ; Perform VALIDATE pattern this many times
#results_dir: ~/printer_data/config ; Destination directory for graphs

######################## Board Pins ############################
[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PB5,  EXP1_3=PA9,   EXP1_5=PA10, EXP1_7=PB8, EXP1_9=<GND>,
    EXP1_2=PA15, EXP1_4=<RST>, EXP1_6=PB9,  EXP1_8=PD6, EXP1_10=<5V>

# menu mods
[menu __main __octoprint]
type: disabled


#### Test For Macro Cross Reference
[gcode_macro TEST_A]
gcode:
    TEST_B

[gcode_macro TEST_B]
gcode:
    M117 Hello


############################ MACROS ##################################
############################# SAY #########################
#Usage Examples (All Work)
#    SAY Printing started
#    SAY Heating bed, please wait...
#    SAY Z-offset = -1.235
#    SAY Error: BLTouch failed to deploy!
#    SAY Mesh loaded, profile: default

[gcode_macro SAY]
description: Send text to both LCD (M117) and console (M118)
gcode:
    {% set msg = ' '.join(PARAMS.keys()) if PARAMS else RAW_PARAMS %}
    {% if msg %}
        M117 {msg}
        M118 {msg}
        RESPOND MSG="{msg}"
    {% endif %}

#[gcode_macro T0]
#gcode:
    # Single extruder printer, ignore tool change

#try and fix cr touch not deploying during g28
[gcode_macro PROBE_RESET]
gcode:
    BLTOUCH_DEBUG COMMAND=reset
    G4 P500


    
[gcode_macro HOME_IF_NEEDED]
description: Home only if bed mesh has not been run this session
gcode:
    M118 HOME_IF_NEEDED
    RESPOND MSG="Start HomeIfNeeded..."
    {% if not printer["gcode_macro GLOBAL_VARS"].mesh_done %}
        RESPOND MSG="Mesh not done yet - homing"
        G28
    {% else %}
        RESPOND MSG="Skipping G28 - mesh already done"
    {% endif %}    
        RESPOND MSG="...End HomeIfNeeded"
    
# to change the hotend fan heater cooler
# Buttons in Mainsail, Auto behavior still works, No slider


[gcode_macro HOTEND_FAN_ON]
gcode:
    SET_HEATER_FAN FAN=nozzle_cooling_fan SPEED=1.0

[gcode_macro HOTEND_FAN_OFF]
gcode:
    SET_HEATER_FAN FAN=nozzle_cooling_fan SPEED=0

# temporary use for testing voltage to fan
#[gcode_macro HOTEND_FAN_ON]
#gcode:
#    SET_FAN_SPEED SPEED=1.0
#
#[gcode_macro HOTEND_FAN_OFF]
#gcode:
#    SET_FAN_SPEED SPEED=0




[gcode_macro DISABLE_STEPPERS]
gcode:
    M84
    SET_KINEMATIC_POSITION x=0 y=0 z=0
    
# # #[gcode_macro DISABLE_STEPPERS]
# # #rename_existing: DISABLE_STEPPERS_BASE
# # #gcode:
