# adx1345.cfg
# 2025-12-16

[mcu pico]
#   ls /dev/serial/by-id/
# /dev/serial/by-id/usb-Klipper_rp2040_E6647C7403803B35-if00
serial: /dev/serial/by-id/usb-Klipper_rp2040_E6647C7403510831-if00
; usb-Klipper_rp2040_E6647C7403510831-if00


#[adxl345]
#spi_bus: spi0a
#cs_pin: pico:gpio5
[adxl345]
cs_pin: !pico:gpio5
spi_software_sclk_pin: pico:gpio2
spi_software_mosi_pin: pico:gpio3
spi_software_miso_pin: pico:gpio4
#spi_speed: 500000
spi_speed: 100000
axes_map: x,y,z


[resonance_tester]
accel_chip: adxl345
probe_points:
    117,117,20



