[server]
host: 0.0.0.0
port: 7125
klippy_uds_path: /home/ajs/printer_data/comms/klippy.sock
unix_socket_path: /home/ajs/printer_data/comms/moonraker.sock

[authorization]
trusted_clients:
  127.0.0.1
  ::1
  192.168.0.0/16
  10.0.0.0/8

[update_manager]
channel: dev
refresh_interval: 168

[update_manager mainsail]
type: web
repo: mainsail-crew/mainsail

[update_manager klipper]
type: git_repo
path: /home/ajs/klipper
origin: https://github.com/Klipper3d/klipper

[update_manager moonraker]
type: git_repo
path: /home/ajs/moonraker
origin: https://github.com/Arksine/moonraker

[update_manager klipper-backup]
type: git_repo
path: /home/ajs/klipper-backup
repo: https://github.com/jordanruthe/klipper-backup
