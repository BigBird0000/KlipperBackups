
[gcode_macro __CFG_MARKER_PauseResumeCancelM600]
gcode:
    RESPOND PREFIX="CFG" MSG="Loaded: PauseResumeCancelM600.cfg"




[gcode_arcs]
#resolution: 1.0
#   An arc will be split into segments. Each segment's length will
#   equal the resolution in mm set above. Lower values will produce a
#   finer arc, but also more work for your machine. Arcs smaller than
#   the configured value will become straight lines. The default is
#   1mm.


[gcode_macro SAY_FILE]
description: Capture current filename and display it
gcode:
    {% if printer.print_stats.filename %}
        SET_GCODE_VARIABLE MACRO=GLOBAL_VARS VARIABLE=last_filename VALUE="{printer.print_stats.filename}"
        M117 {printer.print_stats.filename}
        RESPOND MSG="File: {printer.print_stats.filename}"
    {% else %}
        SET_GCODE_VARIABLE MACRO=GLOBAL_VARS VARIABLE=last_filename VALUE=""
        M117 No file printing
        RESPOND MSG="No file printing"
    {% endif %}

[gcode_macro SET_FILE]
description: Capture current filename and display it
gcode:
    {% if printer.print_stats.filename %}
        SET_GCODE_VARIABLE MACRO=GLOBAL_VARS VARIABLE=last_filename VALUE="{printer.print_stats.filename}"
;      M117 {printer.print_stats.filename}
;      RESPOND MSG="File: {printer.print_stats.filename}"
    {% else %}
        SET_GCODE_VARIABLE MACRO=GLOBAL_VARS VARIABLE=last_filename VALUE=""
;      M117 No file printing
;      RESPOND MSG="No file printing"
    {% endif %}


[gcode_macro SAY_WITH_FILE]
gcode:
    RESPOND  MSG="in SAY_WITH_FILE"
    SET_FILE
    {% set fname = printer["gcode_macro GLOBAL_VARS"].last_filename %}
    {% if fname %}
        RESPOND  MSG="if fname {fname}"
    {% else %}
        RESPOND  MSG="No Active File {fname}"
    {% endif %}

