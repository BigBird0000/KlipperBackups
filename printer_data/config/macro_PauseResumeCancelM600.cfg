#################### M600 (Filament Change) Alias
#This allows your pause to work natively with slicers that insert M600 for
# color changes. This just calls the pause macro (above).

# # # [gcode_macro M600]
# # # description: Alias for filament change (Marlin-style)
# # # gcode:
# # #     FILAMENT_CHANGE

#[gcode_macro M600]
#description: Filament change (sensorless)
#gcode:
#    RESPOND MSG="*** FILAMENT CHANGE REQUESTED ***"
#    PAUSE Z_MIN=10

[gcode_macro M600]
description: Filament Change
gcode:
    {% set x_park = printer.toolhead.axis_maximum.x - 10 %}
    {% set y_park = printer.toolhead.axis_maximum.y - 10 %}
    {% set z_lift = 10 %}

    RESPOND TYPE=command MSG="Filament change initiated"
    M117 Filament Change

    PAUSE

    G91
    G1 Z{z_lift} F600
    G90
    G1 X{x_park} Y{y_park} F6000

    RESPOND TYPE=command MSG="Change filament and press Resume"
    M117 Change Filament and Press Resume

    AJS2 SET_LED_EFFECT EFFECT=pause_breathing


