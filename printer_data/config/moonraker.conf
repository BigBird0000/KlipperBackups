#!/bin/bash

# ============================================================
#  Klipper / Moonraker / Mainsail Self-Healing Status Script
#  Author: Alan + Copilot
#  Purpose: Detect and repair common failures in Klipper stack
# ============================================================

RED="\e[31m"; GREEN="\e[32m"; YELLOW="\e[33m"; BLUE="\e[34m"; RESET="\e[0m"

KLIPPER_SERVICE="/etc/systemd/system/klipper.service"
KLIPPER_CFG="/home/ajs/printer_data/config/printer.cfg"
KLIPPER_LOG="/home/ajs/printer_data/logs/klippy.log"
KLIPPER_REPO="/home/ajs/klipper"
KLIPPER_ENV="/home/ajs/klippy-env/bin/python"
MOONRAKER_SOCK="/home/ajs/printer_data/comms/moonraker.sock"
KLIPPY_SOCK="/home/ajs/printer_data/comms/klippy.sock"

REPAIRS=()   # <-- Collects repair actions for the Repair Summary

print_header() {
    echo -e "\n${BLUE}=============================="
    echo -e " $1"
    echo -e "==============================${RESET}"
}

status_row() {
    printf "%-25s %s\n" "$1" "$2"
}

# ============================================================
# 1. CHECK KLIPPER SERVICE FILE
# ============================================================
print_header "Checking Klipper Service"

KLIPPER_STATUS="OK"

if [[ ! -f "$KLIPPER_SERVICE" ]]; then
    echo -e "${RED}Klipper service file missing!${RESET}"
    KLIPPER_STATUS="Missing"
else
    EXEC=$(grep ExecStart "$KLIPPER_SERVICE")
    if [[ "$EXEC" != *"printer.cfg"* ]]; then
        echo -e "${RED}Klipper ExecStart missing printer.cfg argument!${RESET}"
        echo -e "${YELLOW}This is a stale legacy service file.${RESET}"
        KLIPPER_STATUS="Broken"
    else
        echo -e "${GREEN}Klipper service file looks correct.${RESET}"
    fi
fi

# ============================================================
# SELF-HEALING: FIX BROKEN KLIPPER SERVICE + TEMPLATE
# ============================================================
print_header "Self-Healing: Klipper Service + Template"

KIAUH_TEMPLATE="/home/ajs/kiauh/kiauh/components/klipper/assets/klipper.service"
SYSTEMD_SERVICE="/etc/systemd/system/klipper.service"
GOOD_EXECSTART="/home/ajs/klippy-env/bin/python /home/ajs/klipper/klippy/klippy.py /home/ajs/printer_data/config/printer.cfg -l /home/ajs/printer_data/logs/klippy.log"

fix_klipper_template() {
    echo -e "${YELLOW}Repairing KIAUH Klipper service template...${RESET}"
    sudo tee "$KIAUH_TEMPLATE" >/dev/null <<EOF
[Unit]
Description=Klipper 3D Printer Firmware
Documentation=https://www.klipper3d.org/
After=network-online.target
Wants=network-online.target

[Install]
WantedBy=multi-user.target

[Service]
Type=simple
User=ajs
WorkingDirectory=/home/ajs/klipper
ExecStart=$GOOD_EXECSTART
Restart=always
RestartSec=10
EOF
    echo -e "${GREEN}Template repaired.${RESET}"
    REPAIRS+=("Repaired KIAUH Klipper template")
}

fix_klipper_service() {
    echo -e "${YELLOW}Reinstalling Klipper service...${RESET}"
    sudo rm -f "$SYSTEMD_SERVICE"
    sudo systemctl daemon-reload
    sudo systemctl reset-failed

    /home/ajs/kiauh/kiauh.sh -i klipper --yes >/dev/null 2>&1

    echo -e "${GREEN}Klipper service reinstalled.${RESET}"
    REPAIRS+=("Reinstalled Klipper service")
}

# 1. Installed service check
if [[ -f "$SYSTEMD_SERVICE" ]]; then
    if ! grep -q "$GOOD_EXECSTART" "$SYSTEMD_SERVICE"; then
        echo -e "${RED}Klipper service is incorrect or legacy.${RESET}"
        fix_klipper_service
    else
        echo -e "${GREEN}Klipper service is correct.${RESET}"
    fi
else
    echo -e "${RED}Klipper service missing.${RESET}"
    fix_klipper_service
fi

# 2. Template check
if ! grep -q "$GOOD_EXECSTART" "$KIAUH_TEMPLATE"; then
    echo -e "${RED}KIAUH Klipper template is incorrect.${RESET}"
    fix_klipper_template
else
    echo -e "${GREEN}KIAUH template is correct.${RESET}"
fi

# ============================================================
# 2. CHECK KLIPPER RUNTIME
# ============================================================
print_header "Checking Klipper Runtime"

if systemctl is-active --quiet klipper; then
    echo -e "${GREEN}Klipper is running${RESET}"
else
    echo -e "${RED}Klipper is NOT running${RESET}"
    echo -e "${YELLOW}Attempting restart...${RESET}"

    sudo systemctl restart klipper
    sleep 2

    if ! systemctl is-active --quiet klipper; then
        echo -e "${RED}Klipper failed to start${RESET}"
        journalctl -u klipper -n 10 --no-pager
        REPAIRS+=("Klipper failed to start after repair")
        KLIPPER_STATUS="Broken"
    else
        echo -e "${GREEN}Klipper recovered after restart${RESET}"
        REPAIRS+=("Klipper auto-restarted successfully")
        KLIPPER_STATUS="OK"
    fi
fi

###############################################
# Moonraker Healing Module (Option B)
###############################################

MOONRAKER_CONF="/home/ajs/printer_data/config/moonraker.conf"
MOONRAKER_DIR="/home/ajs/printer_data"
MOONRAKER_SERVICE="/etc/systemd/system/moonraker.service"

print_header "Moonraker Healing"

# 1. Ensure required directories exist
REQUIRED_DIRS=(
    "$MOONRAKER_DIR"
    "$MOONRAKER_DIR/logs"
    "$MOONRAKER_DIR/config"
    "$MOONRAKER_DIR/comms"
)

for d in "${REQUIRED_DIRS[@]}"; do
    if [[ ! -d "$d" ]]; then
        echo -e "${YELLOW}Missing directory: $d — creating it${RESET}"
        mkdir -p "$d"
        chown ajs:ajs "$d"
        REPAIRS+=("Created missing Moonraker directory: $d")
    fi
done

# 2. Comment out all update_manager blocks except the main one
echo -e "${BLUE}Scanning for extra update_manager blocks...${RESET}"

EXTRA_UPD_NAMES=()
while IFS= read -r line; do
    # line like: [update_manager mainsail-config]
    name=$(echo "$line" | sed -E 's/^

\[update_manager[[:space:]]+([^]]+)\]

/\1/')
    [[ -n "$name" ]] && EXTRA_UPD_NAMES+=("$name")
done < <(grep -E '^

\[update_manager ' "$MOONRAKER_CONF" || true)

if (( ${#EXTRA_UPD_NAMES[@]} > 0 )); then
    echo -e "${YELLOW}Found extra update_manager blocks:${RESET}"
    for name in "${EXTRA_UPD_NAMES[@]}"; do
        echo -e " - [update_manager $name]"
    done

    cp "$MOONRAKER_CONF" "$MOONRAKER_CONF.bak_$(date +%s)"
    echo -e "${GREEN}Backup created.${RESET}"

    for name in "${EXTRA_UPD_NAMES[@]}"; do
        sed -i "/^

\[update_manager $name\]

/,/^

\[/ s/^/#/" "$MOONRAKER_CONF"
        REPAIRS+=("Commented extra update_manager block: $name")
    done
else
    echo -e "${GREEN}No extra update_manager blocks found.${RESET}"
fi

# 3. Validate Moonraker service file (light check)
EXPECTED_EXEC="/home/ajs/moonraker-env/bin/python /home/ajs/moonraker/moonraker/moonraker.py -c /home/ajs/printer_data/config/moonraker.conf"
if [[ -f "$MOONRAKER_SERVICE" ]]; then
    SERVICE_EXEC=$(grep ExecStart "$MOONRAKER_SERVICE" | awk -F'ExecStart=' '{print $2}')
    if [[ "$SERVICE_EXEC" != "$EXPECTED_EXEC" ]]; then
        echo -e "${YELLOW}Moonraker ExecStart mismatch (not fatal, just noted).${RESET}"
    else
        echo -e "${GREEN}Moonraker service file looks sane.${RESET}"
    fi
else
    echo -e "${YELLOW}Moonraker service file not found (managed by KIAUH or distro).${RESET}"
fi

# 4. Restart Moonraker after healing
echo -e "${BLUE}Restarting Moonraker to apply changes...${RESET}"
sudo systemctl restart moonraker
sleep 2

# ============================================================
# 3. CHECK MOONRAKER
# ============================================================
print_header "Checking Moonraker"

if systemctl is-active --quiet moonraker; then
    echo -e "${GREEN}Moonraker is running${RESET}"
    MOONRAKER_STATUS="active"
else
    echo -e "${RED}Moonraker is NOT running${RESET}"
    echo -e "${YELLOW}Attempting restart...${RESET}"
    sudo systemctl restart moonraker
    sleep 2
    if systemctl is-active --quiet moonraker; then
        echo -e "${GREEN}Moonraker recovered after restart${RESET}"
        REPAIRS+=("Restarted Moonraker")
        MOONRAKER_STATUS="active"
    else
        echo -e "${RED}Moonraker failed to start${RESET}"
        REPAIRS+=("Moonraker failed to start after restart")
        MOONRAKER_STATUS="inactive"
    fi
fi

# Moonraker socket check + self-heal
if [[ -S "$MOONRAKER_SOCK" ]]; then
    echo -e "${GREEN}Moonraker socket OK${RESET}"
else
    echo -e "${RED}Moonraker socket missing${RESET}"
    echo -e "${YELLOW}Attempting to restart Moonraker to regenerate socket...${RESET}"
    sudo systemctl restart moonraker
    sleep 2

    if [[ -S "$MOONRAKER_SOCK" ]]; then
        echo -e "${GREEN}Moonraker socket recovered${RESET}"
        REPAIRS+=("Moonraker socket regenerated")
    else
        echo -e "${RED}Moonraker socket still missing${RESET}"
        REPAIRS+=("Moonraker socket missing after restart")
        MOONRAKER_STATUS="inactive"
    fi
fi

# ============================================================
# 4. CHECK MAINSAIL
# ============================================================
print_header "Checking Mainsail"

if [[ -d "/home/ajs/mainsail" ]]; then
    echo -e "${GREEN}Mainsail directory exists${RESET}"
    MAINSAIL_STATUS="OK"
else
    echo -e "${RED}Mainsail directory missing${RESET}"
    MAINSAIL_STATUS="Missing"
    REPAIRS+=("Mainsail directory missing")
fi

# ============================================================
# 5. CHECK WEB SERVER
# ============================================================
print_header "Checking Web Server"

WEBSERVER_STATUS="None"
if systemctl is-active --quiet caddy; then
    WEBSERVER_STATUS="caddy (active)"
elif systemctl is-active --quiet nginx; then
    WEBSERVER_STATUS="nginx (active)"
fi

if [[ "$WEBSERVER_STATUS" == "None" ]]; then
    echo -e "${RED}No known web server active${RESET}"
else
    echo -e "${GREEN}$WEBSERVER_STATUS${RESET}"
fi

# ============================================================
# 6. CHECK SOCKETS
# ============================================================
print_header "Checking Sockets"

if [[ -S "$KLIPPY_SOCK" ]]; then
    echo -e "${GREEN}Klippy socket OK${RESET}"
else
    echo -e "${RED}Klippy socket missing${RESET}"
    REPAIRS+=("Klippy socket missing")
fi

# ============================================================
# 7. SUMMARY TABLE
# ============================================================
echo -e "\n=============================="
echo -e " SUMMARY TABLE"
echo -e "=============================="

# Helper to colorize OK/FAIL
colorize_status() {
    local status="$1"
    if [[ "$status" =~ ^(active|OK|running|nginx \(active\)|caddy \(active\))$ ]]; then
        echo -e "${GREEN}$status${RESET}"
    else
        echo -e "${RED}$status${RESET}"
    fi
}

printf "%-24s %-20s\n" "Service" "Status"
printf "%-24s %-20s\n" "------------------------" "---------------"

printf "%-24s %-20s\n" "Klipper"   "$(colorize_status "${KLIPPER_STATUS:-Unknown}")"
printf "%-24s %-20s\n" "Moonraker" "$(colorize_status "${MOONRAKER_STATUS:-Unknown}")"
printf "%-24s %-20s\n" "Web Server" "$(colorize_status "${WEBSERVER_STATUS:-None}")"
printf "%-24s %-20s\n" "Mainsail Dir" "$(colorize_status "${MAINSAIL_STATUS:-Unknown}")"

# ============================================================
# 8. REPAIR SUMMARY
# ============================================================
print_header "Repair Summary"

if [[ ${#REPAIRS[@]} -eq 0 ]]; then
    echo -e "${GREEN}No repairs were needed.${RESET}"
else
    for item in "${REPAIRS[@]}"; do
        echo -e "${YELLOW}- $item${RESET}"
    done
fi

echo -e "${RESET}"
