

#Ensure you have the Klipper-LED_Effect plugin installed.
# In your printer.cfg, ensure your LED is named status_leds.
# If it's named something else, change the leds: lines below.

#Instead of usingSET_LED and SET_LED_EFFECT.
# In the new version, STOP_LED_EFFECTS


# trigger effect  from Klipper/Mainsail/Fluidd console, use the SET_LED_EFFECT command.
# To start an effect:
#    SET_LED_EFFECT EFFECT=panel_idle
# To stop all effects (turn off LEDs):
#    STOP_LED_EFFECTS
# To stop one specific effect:
#    STOP_LED_EFFECTS EFFECT=panel_idle

# Using the Macros (Recommended)
#  
#  In the "Repair Module" I gave you, I wrapped the plugin commands inside standard G-code macros.
# This is the "cleanest" way to do it because the macros include a command 
# to stop the previous effect first so they don't overlap.
#  
#  You can simply type these into your console or put them in your START_PRINT or END_PRINT scripts:
#  Desired State	Macro Command to Run
#  Idle/Standby	LED_IDLE
#  Printing	LED_PRINTING
#  Finished/Done	LED_COMPLETE
#  Error/Emergency	LED_ERROR
#
# Automatic "Hooks"
#  
#  You don't actually have to "call" several of these because they are already linked to your printer's hardware or existing functions:
#      Filament Runout: Because of the [filament_switch_sensor filament] block, the purple chase effect will start automatically as soon as the sensor detects you are out of filament.
#      Heating: The heating_effects block has heater: extruder defined. This means the plugin is "watching" your hotend. You can set it to autostart: true if you want it to always reflect the temperature, or trigger it in your START_PRINT macro with SET_LED_EFFECT EFFECT=heating_effects.
#      Pause/Resume: I modified your PAUSE and RESUME macros so the LEDs will automatically switch to "Yellow Breathing" when you hit pause and back to "White" when you resume.
#  
# Use them in your Print Start/End. To make your printer feel "alive",
#     add these to your existing macros in printer.cfg:
#  
#  [gcode_macro START_PRINT]
#  gcode:
#      LED_IDLE             # Start with blue idle
#      G28                  # Home
#      SET_LED_EFFECT EFFECT=heating_effects # Switch to temp gradient while heating
#      M109 S210            # Wait for hotend temp
#      LED_PRINTING         # Switch to white light once printing starts
#  
#  
#  [gcode_macro END_PRINT]
#  gcode:
#      TURN_OFF_HEATERS
#      LED_COMPLETE         # Switch to green breathing
#  
#  

