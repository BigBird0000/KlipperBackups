#####################################################################
# # # # # # # # # # # # # # #  MACROS  # # # # # # # # # # # # # # #
#####################################################################

[gcode_macro LED_IDLE]
gcode:
    STOP_LED_EFFECTS
    SET_LED_EFFECT EFFECT=panel_idle
    M118 LED_IDLE

[gcode_macro LED_PRINTING]
gcode:
    STOP_LED_EFFECTS
    SET_LED_EFFECT EFFECT=printing_glow
    M118 LED_PRINTING
	
[gcode_macro LED_COMPLETE]
gcode:
    STOP_LED_EFFECTS
    SET_LED_EFFECT EFFECT=complete_glow
    M118 LED_COMPLERE

[gcode_macro LED_ERROR]
gcode:
    STOP_LED_EFFECTS
    SET_LED_EFFECT EFFECT=critical_error
    M118 LED_ERROR

#####################################################################
# # # # # # # # # # # # # # #  HOOKS  # # # # # # # # # # # # # # # #
#####################################################################




[filament_switch_sensor filament]
switch_pin: ^PA4
pause_on_runout: True
runout_gcode:
    STOP_LED_EFFECTS
    SET_LED_EFFECT EFFECT=filament_runout
    M118 FILAMENT_RUNOUT

[gcode_macro SHUTDOWN]
gcode:
    STOP_LED_EFFECTS
    SET_LED_EFFECT EFFECT=critical_error
    M118 CRITICAL_ERROR