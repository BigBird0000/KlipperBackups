[gcode_macro SET_TEMP_NOWAIT]
description = Set bed + hotend to low temps (no wait)
gcode =
    {% set bed = params.BED|float %}
    {% set cool = params.EXTRUDER|float %}

    RESPOND MSG="SET_TEMP_NOWAIT: Bed={bed} Cool={cool}"

    M140 S{bed}
    M104 S{cool}


[gcode_macro SET_TEMP_WAIT]
description = Heat bed first, then hotend
gcode =
    {% set bed = params.BED|float %}
    {% set extruder = params.EXTRUDER|float %}

# start heating hot end to extrusion temp, nowait as we want it to heat up if we are waiting for bed
    RESPOND  MSG="background Heating hotend to {extruder} [no-waitwaiting]"
    M104 S{extruder}
    
    # wait for BED to get to temp
    RESPOND MSG="Heating bed to {bed} [waiting]"
    M190 S{bed}

    # Wait for hot end to get to temp
    RESPOND MSG="Heating hotend to {extruder} [waiting]"
    M109 S{extruder}

    RESPOND MSG="Temps OK"







# M190 S{bed}      # Wait for bed
