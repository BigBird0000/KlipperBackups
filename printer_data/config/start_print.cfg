#  start_print.cfg


[gcode_macro GLOBAL_VARS]
description: holds various variables to act like a global variable
variable_mesh_done: False
variable_last_filename: ""
gcode:
[gcode_macro GLOBAL_TEMPS]
description: holds various temp variables to act like a global variable
variable_bed: 0
variable_extruder: 0
variable_extrudercool:0
gcode:



[gcode_macro START_PRINT]
gcode:
## Used to get klipper to debug look for DEBUGAJS
# SET_LOG_LEVEL GCODE:DEBUG
##
    RESPOND MSG="Start START_PRINT..."
    G28
    BLTOUCH_DEBUG COMMAND=reset
    SAY "in START_PRINT"
    RESPOND MSG="Respond in START_PRINT"
    BED_MESH_ONCE
    BED_MESH_PROFILE LOAD=default
    SKEW_PROFILE LOAD=Calilantern
    LED_PRINTING 
    RESPOND MSG="... end START_PRINT..."
 
[gcode_macro SET_TEMPS]
description: Set bed and extruder temps from G-code
gcode:
    RESPOND MSG="Start SET_TEMPS..."

    {% set bed = params.BED|default(60)|float %}
    {% set extruder = params.EXTRUDER|default(200)|float %}
    {% set extrudercool = params.EXTRUDERCOOL|default(160)|float %}

    SET_GCODE_VARIABLE MACRO=GLOBAL_TEMPS VARIABLE=bed VALUE={bed}
    SET_GCODE_VARIABLE MACRO=GLOBAL_TEMPS VARIABLE=extruder VALUE={extruder}
    SET_GCODE_VARIABLE MACRO=GLOBAL_TEMPS VARIABLE=extrudercool VALUE={extrudercool}

    RESPOND PREFIX="INFO" MSG="Setting bed: {bed} extruder: {extruder} ExtruderCool: {extrudercool}"
    RESPOND MSG="... end SET_TEMPS"


# M190 S{bed}      # Wait for bed
#M109 S{extruder} # Wait for nozzle
 
 
[gcode_macro CHANGED_BED]
description: We changed bed - either to pei, glass, turned over
gcode:
  SET_GCODE_VARIABLE MACRO=GLOBAL_VARS VARIABLE=mesh_done VALUE=False

# # #[gcode_macro BED_MESH_ONCE]
# # #description: Run bed mesh only once per power-on
# # #gcode:
# # #    {% if not printer["gcode_macro GLOBAL_VARS"].mesh_done %}
# # #        M117 Running BED_MESH_CALIBRATE
# # #        RESPOND MSG="Running bed mesh calibration"
# # #        BED_MESH_CALIBRATE
# # #        SET_GCODE_VARIABLE MACRO=GLOBAL_VARS VARIABLE=mesh_done VALUE=True
# # #        M117 Bed mesh completed
# # #    {% else %}
# # #        RESPOND MSG="Bed mesh already calibrated this session"
# # #        M117 Bed mesh already done
# # #    {% endif %}
# # #  
[gcode_macro BED_MESH_ONCE]
description: Run bed mesh only once per power-on
gcode:
    M117 Start: BED_MESH_CALIBRATE 
	M118 Start: BED_MESH_CALIBRATE 2
    {% if not printer["gcode_macro GLOBAL_VARS"].mesh_done %}
        RESPOND PREFIX=" " MSG="Running bed mesh calibration"
        BED_MESH_CALIBRATE
        SET_GCODE_VARIABLE MACRO=GLOBAL_VARS VARIABLE=mesh_done VALUE=True
    {% else %}
        RESPOND PREFIX=" " MSG="Bed mesh already calibrated this session"
    {% endif %}
    M117 Ended BED_MESH_CALIBRATE 
    M118 Ended BED_MESH_CALIBRATE 2
	
######################## custom MATERIAL_PARTICULARS ###############
# USAGE:
#    MATERIAL_PARTICULARS MATERIAL=PLA
#    MATERIAL_PARTICULARS MATERIAL=PETG
#    MATERIAL_PARTICULARS MATERIAL=TPU

# 
# How to Fine-Tune (PETG) in particular
# Once you update the macro, run a first-layer calibration square and watch for these signs:
#Visual Sign                Meaning                 Adjustment
#Gaps between lines	        Nozzle is too high   	Decrease the value (e.g., from 0.02 to 0.00)
#Rough texture / "plowing"   Nozzle is too low       Increase the value (e.g., from 0.02 to 0.04)
#Filament sticking to nozzle	Nozzle is way too low	Increase the value immediately
#


[gcode_macro MATERIAL_PARTICULARS]
# To move the nozzle closer to the bed, you use a more negative Z offset.
#     More Negative = nozzle moves DOWN (closer to bed)
#     More Positive= nozzle moves UP (farther from bed)
description: Set Z offset based on filament material
variable_pla_offset: -0.04  # was -0.02, try lower down (more negative)
variable_petg_offset: 0.02  # was -0.02
variable_tpu_offset: -0.06

gcode:
  {% set material = params.MATERIAL|default("PLA")|upper %}

  {% if material == "PLA" %}
    SET_GCODE_OFFSET Z={printer["gcode_macro MATERIAL_PARTICULARS"].pla_offset} MOVE=1
    RESPOND PREFIX="Material" MSG="PLA Z offset applied"
    
    
  {% elif material == "PETG" %}
    SET_GCODE_OFFSET Z={printer["gcode_macro MATERIAL_PARTICULARS"].petg_offset} MOVE=1
    RESPOND PREFIX="Material" MSG="PETG Z offset applied"
    
  {% elif material == "TPU" %}
    SET_GCODE_OFFSET Z={printer["gcode_macro MATERIAL_PARTICULARS"].tpu_offset} MOVE=1
    RESPOND PREFIX="Material" MSG="TPU Z offset applied"
    
  {% else %}
    RESPOND TYPE=error MSG=Unknown_material_{material}
  {% endif %}
  
  
[gcode_macro RESET_Z_OFFSET]
gcode:
  SET_GCODE_OFFSET Z=0 MOVE=1
  RESPOND MSG="Z offset reset to 0"