[gcode_macro BED_MESH_ONCE]
description: Run bed mesh only once per power-on
gcode:
    M117 Start: BED_MESH_CALIBRATE 
    M118 Start: BED_MESH_CALIBRATE 2
    {% if not printer["gcode_macro GLOBAL_VARS"].mesh_done %}
        RESPOND  MSG="Running bed mesh calibration"
        BED_MESH_CALIBRATE
        SET_GCODE_VARIABLE MACRO=GLOBAL_VARS VARIABLE=mesh_done VALUE=True
    {% else %}
        RESPOND  MSG="Bed mesh already calibrated this session"
    {% endif %}
    M117 Ended BED_MESH_CALIBRATE 
    M118 Ended BED_MESH_CALIBRATE 2
    
######################## custom MATERIAL_PARTICULARS ###############
# USAGE:
#    MATERIAL_PARTICULARS MATERIAL=PLA
#    MATERIAL_PARTICULARS MATERIAL=PETG
#    MATERIAL_PARTICULARS MATERIAL=TPU

# 
# How to Fine-Tune (PETG) in particular
# Once you update the macro, run a first-layer calibration square and watch for these signs:
#   Visual Sign                       Meaning                  Adjustment
# Gaps between lines             Nozzle is too high       Decrease the value (e.g., from 0.02 to 0.00)
# Rough texture / "plowing"      Nozzle is too low        Increase the value (e.g., from 0.02 to 0.04)
# Filament sticking to nozzle    Nozzle is way too low    Increase the value immediately
#
# MATERIAL_PARTICULARS macro
# Negative Z = nozzle moves DOWN (closer to bed)
# Positive Z = nozzle moves UP (farther from bed)

[gcode_macro MATERIAL_PARTICULARS]
description: Set Z offset based on filament material

variable_pla_offset: -0.04
variable_petg_offset: 0.02
variable_tpu_offset: -0.06

gcode:
  {% set material = params.MATERIAL|default("PLA")|upper %}

  {% if material == "PLA" %}
    SET_GCODE_OFFSET Z={printer["gcode_macro MATERIAL_PARTICULARS"].variable_pla_offset} MOVE=1
    SET_RETRACTION LENGTH=0.5
    RESPOND MSG="PLA Z Offset And Retraction Applied"

  {% elif material == "PETG" %}
    SET_GCODE_OFFSET Z={printer["gcode_macro MATERIAL_PARTICULARS"].variable_petg_offset} MOVE=1
    SET_RETRACTION LENGTH=0.5
    RESPOND MSG="PETG Z Offset And Retraction Applied"

  {% elif material == "TPU" %}
    SET_GCODE_OFFSET Z={printer["gcode_macro MATERIAL_PARTICULARS"].variable_tpu_offset} MOVE=1
    SET_RETRACTION LENGTH=0.5
    RESPOND MSG="TPU Z Offset And Retraction Applied"

  {% else %}
    RESPOND TYPE=error MSG="Unknown material: {material} in MATERIAL_PARTICULARS"
  {% endif %}

  
  
[gcode_macro RESET_Z_OFFSET]
gcode:
  SET_GCODE_OFFSET Z=0 MOVE=1
  RESPOND MSG="Z offset reset to 0"